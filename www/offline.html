<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne - LycéePad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2EA3F2 0%, #1a6fa8 100%);
      color: white;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 24px;
      display: block;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 1rem; opacity: 0.85; line-height: 1.6; margin-bottom: 8px; }
    .hint { font-size: 0.85rem; opacity: 0.65; margin-top: 20px; }
    button {
      margin-top: 28px;
      padding: 13px 28px;
      background: white;
      color: #1a6fa8;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Vous êtes hors-ligne</h1>
    <p>La connexion au réseau du lycée est indisponible.</p>
    <p>Les contenus déjà consultés restent accessibles en cache.</p>
    <p class="hint">Reconnectez-vous au WiFi du lycée puis réessayez.</p>
    <button onclick="window.location.reload()">↺ Réessayer</button>
  </div>
</body>
</html>
