<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LycéePad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #0d4f82 0%, #1a6fa8 50%, #2EA3F2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Déco */
    body::before {
      content: '';
      position: fixed;
      top: -150px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -120px; left: -80px;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
    }

    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      z-index: 1;
    }

    /* Logo */
    .logo-img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 8px 32px rgba(0,0,0,0.45));
      margin-bottom: 28px;
    }

    /* Texte */
    .app-name {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.3);
      margin-bottom: 12px;
    }

    .divider {
      width: 50px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.5);
      margin-bottom: 14px;
    }

    .school-name {
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.95);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .school-city {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.5px;
      margin-bottom: 52px;
    }

    /* Barre de chargement */
    .loader-track {
      width: 160px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 45%;
      background: rgba(255,255,255,0.9);
      border-radius: 4px;
      animation: slide 1.3s infinite ease-in-out;
    }

    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(320%); }
    }
  </style>
</head>
<body>
  <div class="splash-content">
    <img class="logo-img" src="img/logo.png" alt="Logo Lycée Saint-Éloi">

    <div class="app-name">LycéePad</div>
    <div class="divider"></div>
    <div class="school-name">Lycée Saint-Éloi</div>
    <div class="school-city">Aix-en-Provence</div>

    <div class="loader-track">
      <div class="loader-fill"></div>
    </div>
  </div>

  <script>
    document.addEventListener('deviceready', function () {
      if (navigator.splashscreen) navigator.splashscreen.hide();
      setTimeout(function () { window.location.href = 'index.html'; }, 2000);
    }, false);

    setTimeout(function () {
      if (!window.cordova) window.location.href = 'index.html';
    }, 2500);
  </script>
</body>
</html>
