<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone - LycéePad</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/ZoneContent.css">
  <link rel="stylesheet" href="../lib/fontawesome/css/svg-with-js.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2EA3F2">
</head>
<body>

<!-- HEADER -->
<nav class="nav">
  <div class="nav-wrap">
    <span class="logo">
      <div class="logo-ring">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2EA3F2"/>
              <stop offset="100%" style="stop-color:#1a6fa8"/>
            </linearGradient>
          </defs>
          <path d="M18 3L33 11v14l-15 8-15-8V11l15-8z" stroke="url(#g1)" stroke-width="2.5" fill="none"/>
          <circle cx="18" cy="18" r="6" fill="url(#g1)" opacity="0.8"/>
        </svg>
      </div>
      <span class="logo-text">LycéePad</span>
    </span>
    
    <button class="hamburger-btn" id="hamburger-toggle" aria-label="Menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    
    <div class="nav-links">
      <a href="../index.html" class="nav-link" data-page="home">
        <span class="link-icon"><i class="fa-solid fa-house" aria-hidden="true"></i></span>
        <span class="link-text">Accueil</span>
        <span class="link-glow"></span>
      </a>
      <a href="map.html" class="nav-link" data-page="map">
        <span class="link-icon"><i class="fa-solid fa-map" aria-hidden="true"></i></span>
        <span class="link-text">Carte</span>
        <span class="link-glow"></span>
      </a>
      <a href="Parcours.html" class="nav-link" data-page="parcours">
        <span class="link-icon"><i class="fa-solid fa-route" aria-hidden="true"></i></span>
        <span class="link-text">Parcours</span>
        <span class="link-glow"></span>
      </a>
      <a href="Quiz.html" class="nav-link" data-page="quiz">
        <span class="link-icon"><i class="fa-solid fa-question-circle" aria-hidden="true"></i></span>
        <span class="link-text">Quiz</span>
        <span class="link-glow"></span>
      </a>
      <a href="scanner.html" class="nav-link" data-page="scanner">
        <span class="link-icon"><i class="fa-solid fa-qrcode" aria-hidden="true"></i></span>
        <span class="link-text">Scanner</span>
        <span class="link-glow"></span>
      </a>
      <a href="About.html" class="nav-link" data-page="about">
        <span class="link-icon"><i class="fa-solid fa-info-circle" aria-hidden="true"></i></span>
        <span class="link-text">À propos</span>
        <span class="link-glow"></span>
      </a>
      <a href="login.html" class="nav-link nav-link-admin" data-page="admin">
        <span class="link-icon"><i class="fa-solid fa-shield-alt" aria-hidden="true"></i></span>
        <span class="link-text">Admin</span>
        <span class="link-glow"></span>
      </a>
    </div>

    <div class="sync-status" id="sync-status" title="État de synchronisation">
      <span class="sync-dot"></span>
      <span class="sync-text">Local</span>
    </div>

  </div>
</nav>

<!-- CONTENT -->
<div class="zone-content">
  <!-- Loading -->
  <div id="loading" class="loading-container" style="display: none;">
    <div class="loading-spinner"></div>
    <p>Chargement de la zone...</p>
  </div>

  <!-- Content -->
  <div id="content" class="content-wrapper">
    <!-- Hero Header -->
    <div class="zone-hero">
      <a href="Parcours.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Retour au parcours
      </a>
      
      <div class="hero-badge">
        <span class="badge-dot"></span>
        <span id="zone-badge">Zone</span>
      </div>
      
      <h1 class="hero-title" id="zone-title"></h1>
      <p class="hero-subtitle" id="zone-description"></p>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Galerie -->
      <section class="section-card gallery-card">
        <div class="section-header">
          <div class="section-icon">📸</div>
          <h2>Galerie photos</h2>
        </div>
        
        <div class="gallery-grid" id="gallery-grid">
          <!-- Généré par JavaScript -->
        </div>
      </section>

      <!-- Description -->
      <section class="section-card description-card">
        <div class="section-header">
          <div class="section-icon">📝</div>
          <h2>À propos de cette zone</h2>
        </div>
        
        <div class="description-content" id="description-content">
          <!-- Généré par JavaScript -->
        </div>

        <!-- Quiz CTA -->
        <div class="quiz-cta">
          <div class="quiz-cta-content">
            <div class="quiz-cta-icon">🎯</div>
            <div class="quiz-cta-text">
              <h3>Testez vos connaissances</h3>
              <p id="quiz-text">Répondez au quiz</p>
            </div>
          </div>
          <a href="Quiz.html" class="btn-quiz" id="quiz-link">
            Accéder au quiz
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </a>
        </div>
      </section>

      <!-- Médias -->
      <div class="media-grid" id="video-section">
        <!-- Vidéo -->
        <section class="section-card media-card">
          <div class="media-header">
            <div class="media-icon video-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
            </div>
            <div>
              <h3>Vidéo de présentation</h3>
              <p class="media-subtitle" id="video-title"></p>
            </div>
          </div>
          <div class="media-placeholder video-placeholder" id="video-placeholder">
            <div class="media-play-btn">▶</div>
            <span>Vidéo à venir</span>
          </div>
        </section>

      </div>
    </div>
  </div>
</div>



<div class="bg-effect"></div>

<!-- Scripts -->
<script src="../lib/fontawesome/js/all.min.js"></script>
<script src="../js/db-manager.js?v=2"></script>
<script src="../js/kiosk.js"></script>
<script src="../js/app.js?v=2"></script>
<script src="../js/ZoneContent.js?v=2"></script>


  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("../service-worker.js").catch(function(){});}</script>
</body>
</html>
