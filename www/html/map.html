<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LycéePad - Plan du Lycée</title>
  
  <!-- CSS dans l'ordre -->
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/map.css">
  <link rel="stylesheet" href="../lib/fontawesome/css/svg-with-js.min.css">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2EA3F2">
</head>
<body>

<!-- HEADER INTÉGRÉ -->
<nav class="nav">
  <div class="nav-wrap">
    <span class="logo">
      <div class="logo-ring">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#2EA3F2"/>
              <stop offset="100%" style="stop-color:#1a6fa8"/>
            </linearGradient>
          </defs>
          <path d="M18 3L33 11v14l-15 8-15-8V11l15-8z" stroke="url(#g1)" stroke-width="2.5" fill="none"/>
          <circle cx="18" cy="18" r="6" fill="url(#g1)" opacity="0.8"/>
        </svg>
      </div>
      <span class="logo-text">LycéePad</span>
    </span>
    
    <button class="hamburger-btn" id="hamburger-toggle" aria-label="Menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    
    <div class="nav-links">
      <a href="../index.html" class="nav-link" data-page="home">
        <span class="link-icon"><i class="fa-solid fa-house" aria-hidden="true"></i></span>
        <span class="link-text">Accueil</span>
        <span class="link-glow"></span>
      </a>
      <a href="map.html" class="nav-link active" data-page="map">
        <span class="link-icon"><i class="fa-solid fa-map" aria-hidden="true"></i></span>
        <span class="link-text">Carte</span>
        <span class="link-glow"></span>
      </a>
      <a href="Parcours.html" class="nav-link" data-page="parcours">
        <span class="link-icon"><i class="fa-solid fa-route" aria-hidden="true"></i></span>
        <span class="link-text">Parcours</span>
        <span class="link-glow"></span>
      </a>
      <a href="Quiz.html" class="nav-link" data-page="quiz">
        <span class="link-icon"><i class="fa-solid fa-question-circle" aria-hidden="true"></i></span>
        <span class="link-text">Quiz</span>
        <span class="link-glow"></span>
      </a>
      <a href="scanner.html" class="nav-link" data-page="scanner">
        <span class="link-icon"><i class="fa-solid fa-qrcode" aria-hidden="true"></i></span>
        <span class="link-text">Scanner</span>
        <span class="link-glow"></span>
      </a>
      <a href="About.html" class="nav-link" data-page="about">
        <span class="link-icon"><i class="fa-solid fa-info-circle" aria-hidden="true"></i></span>
        <span class="link-text">À propos</span>
        <span class="link-glow"></span>
      </a>
      <a href="login.html" class="nav-link nav-link-admin" data-page="admin">
        <span class="link-icon"><i class="fa-solid fa-shield-alt" aria-hidden="true"></i></span>
        <span class="link-text">Admin</span>
        <span class="link-glow"></span>
      </a>
    </div>

    <div class="sync-status" id="sync-status" title="État de synchronisation">
      <span class="sync-dot"></span>
      <span class="sync-text">Local</span>
    </div>

    <button class="theme-btn" id="theme-toggle" title="Changer de thème">
      <span class="theme-icon">
        <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </span>
    </button>
  </div>
</nav>

<!-- CONTENU -->
<main class="main">
  <div class="map-page">
    <!-- Background animé -->
    <div class="background-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
      <a href="../index.html" class="back-button">
        <span>←</span> Retour
      </a>
      
      <div class="status-badge">
        <span class="pulse-dot"></span>
        <span>Navigation Interactive</span>
      </div>
      
      <h1 class="hero-title">
        Plan du <span class="gradient-text">Lycée</span>
      </h1>
      
      <p class="hero-subtitle">
        Explorez notre campus et découvrez chaque zone en détail
      </p>
    </div>

    <!-- Carte principale -->
    <div class="map-container">
      <div class="map-wrapper">
        <div id="map"></div>
        
        <div class="map-controls-info">
          <div class="control-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            <span>Déplacer</span>
          </div>
          <div class="control-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <span>Zoomer</span>
          </div>
          <div class="control-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>Cliquer sur les marqueurs</span>
          </div>
        </div>
      </div>
    </div>


      <div class="zones-grid" id="zones-grid">
        <!-- Les zones seront ajoutées dynamiquement par JavaScript -->
      </div>
    </div>
  </div>
</main>



<!-- Background Effect -->
<div class="bg-effect"></div>

<!-- Scripts -->
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="../lib/fontawesome/js/all.min.js"></script>
<script defer src="../js/db-manager.js"></script>
<script defer src="../js/app.js"></script>
<script defer src="../js/map.js"></script>


  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("../service-worker.js").catch(function(){});}</script>
</body>
</html>
