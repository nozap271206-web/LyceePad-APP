<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - LyceePad</title>
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../lib/fontawesome/css/all.min.css">
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#2EA3F2">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Administration</h1>
                <p>Connexion sécurisée</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Identifiant
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="admin"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Mot de passe
                    </label>
                    <div class="password-input">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Se souvenir de moi</span>
                    </label>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <i class="fas fa-sign-in-alt"></i>
                    Connexion
                </button>

                <div class="error-message" id="errorMessage" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Identifiant ou mot de passe incorrect</span>
                </div>
            </form>

            <div class="login-footer">
                <a href="../index.html" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    Retour à l'accueil
                </a>
            </div>

            <div class="login-info">
                <p><i class="fas fa-info-circle"></i> Identifiants par défaut :</p>
                <p><strong>Utilisateur :</strong> admin</p>
                <p><strong>Mot de passe :</strong> admin</p>
            </div>
        </div>

        <div class="login-bg">
            <div class="bg-circle bg-circle-1"></div>
            <div class="bg-circle bg-circle-2"></div>
            <div class="bg-circle bg-circle-3"></div>
        </div>
    </div>

    <script src="../js/login.js"></script>
        <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('login.html DOMContentLoaded');
        });
        </script>

  <script>if("serviceWorker"in navigator){navigator.serviceWorker.register("../service-worker.js").catch(function(){});}</script>
</body>
</html>
