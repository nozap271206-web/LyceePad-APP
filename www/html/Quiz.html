<!-- CONTENU QUIZ -->
<div class="quiz-page">
  <!-- Background animé -->
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <a href="../index.html" class="back-button">
      <span>←</span> Retour
    </a>
    
    <div class="status-badge">
      <span class="pulse-dot"></span>
      <span>Quiz Interactifs</span>
    </div>
    
    <h1 class="hero-title">
      Testez vos <span class="gradient-text">connaissances</span>
    </h1>
    
    <p class="hero-subtitle">
      Découvrez le Lycée Saint-Éloi à travers des quiz interactifs
    </p>
  </div>
  
  <!-- Sélection des zones -->
  <div id="zone-selection" class="zone-selection">
    <div class="zones-grid" id="zones-grid">
      <!-- Généré par JavaScript -->
    </div>
  </div>
  
  <!-- Quiz actif -->
  <div id="quiz-container" class="quiz-container" style="display: none;">
    <!-- En-tête du quiz -->
    <div class="quiz-header-card">
      <div class="quiz-info">
        <h2 class="quiz-zone-name" id="quiz-zone-name"></h2>
        <div class="quiz-score">
          Score : <span class="score-value" id="current-score">0</span>/<span id="total-questions">0</span>
        </div>
      </div>
      
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="progress-text" id="progress-text">Question 1 sur 1</p>
      </div>
    </div>
    
    <!-- Carte de question -->
    <div class="question-card">
      <div class="question-number" id="question-number">Question 1</div>
      <h3 class="question-title" id="question-title"></h3>
      
      <div class="answers-list" id="answers-list">
        <!-- Généré par JavaScript -->
      </div>
      
      <div id="feedback-section" class="feedback-section" style="display: none;">
        <!-- Généré par JavaScript -->
      </div>
    </div>
  </div>
  
  <!-- Résultats -->
  <div id="results-section" class="results-section" style="display: none;">
    <div class="results-card">
      <div class="results-icon" id="results-icon">🏆</div>
      
      <h2 class="results-title">Quiz terminé !</h2>
      
      <div class="results-score">
        <div class="score-circle">
          <svg width="200" height="200" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="90" fill="none" stroke="#E5E7EB" stroke-width="12"></circle>
            <circle id="score-circle" cx="100" cy="100" r="90" fill="none" stroke="url(#gradient)" stroke-width="12"
              stroke-dasharray="565.48" stroke-dashoffset="565.48"
              transform="rotate(-90 100 100)">
            </circle>
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2EA3F2;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1a6fa8;stop-opacity:1" />
              </linearGradient>
            </defs>
          </svg>
          <div class="score-text">
            <div class="score-number" id="final-score">0</div>
            <div class="score-total" id="final-total">/0</div>
          </div>
        </div>
        
        <div class="score-percentage" id="score-percentage">0%</div>
      </div>
      
      <div class="results-message" id="results-message">
        <!-- Généré par JavaScript -->
      </div>
      
      <div class="results-actions">
        <button onclick="retryQuiz()" class="action-button primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"></polyline>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
          </svg>
          <span>Recommencer</span>
        </button>
        
        <button onclick="backToSelection()" class="action-button secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          <span>Autres quiz</span>
        </button>
        
        <a href="map.html" class="action-button tertiary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
            <line x1="8" y1="2" x2="8" y2="18"></line>
            <line x1="16" y1="6" x2="16" y2="22"></line>
          </svg>
          <span>Retour carte</span>
        </a>
      </div>
    </div>
  </div>
</div>
