<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="1920" viewBox="0 0 1280 1920" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond avec dégradé -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="1280" height="1920" fill="url(#bgGradient)"/>
  
  <!-- Cercles d'arrière-plan décoratifs -->
  <circle cx="200" cy="300" r="100" fill="#ffffff" opacity="0.05"/>
  <circle cx="1080" cy="1600" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="640" cy="1500" r="80" fill="#ffffff" opacity="0.08"/>
  
  <!-- Logo hexagonal (centré) -->
  <g transform="translate(640, 860)">
    <!-- Hexagone -->
    <path d="M0 -200 L173.2 -100 L173.2 100 L0 200 L-173.2 100 L-173.2 -100 Z" 
          stroke="url(#logoGradient)" 
          stroke-width="8" 
          fill="none"
          opacity="0.9"/>
    
    <!-- Cercle intérieur -->
    <circle cx="0" cy="0" r="80" fill="url(#logoGradient)" opacity="0.8"/>
    
    <!-- Cercle central -->
    <circle cx="0" cy="0" r="40" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Texte "LycéePad" -->
  <text x="640" y="1120" 
        font-family="Arial, sans-serif" 
        font-size="72" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle">
    LycéePad
  </text>
  
  <!-- Sous-titre -->
  <text x="640" y="1190" 
        font-family="Arial, sans-serif" 
        font-size="32" 
        fill="#ffffff" 
        opacity="0.8" 
        text-anchor="middle">
    Lycée Saint-Éloi
  </text>
  
  <!-- Texte du projet -->
  <text x="640" y="1750" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        fill="#ffffff" 
        opacity="0.6" 
        text-anchor="middle">
    Projet BTS CIEL 2026
  </text>
  
  <!-- Animation de chargement (points) -->
  <g transform="translate(640, 1680)">
    <circle cx="-40" cy="0" r="8" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="0" cy="0" r="8" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="40" cy="0" r="8" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>
</svg>
